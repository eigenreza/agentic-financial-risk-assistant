apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: financial-risk-assistant
  namespace: default
  labels:
    app: financial-risk-assistant
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: financial-risk-assistant

  minReplicas: 2            # always keep at least 2 pods for HA
  maxReplicas: 8

  metrics:
    # Scale on CPU utilisation (most relevant for the risk calculation workload)
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

    # Scale on memory utilisation (sentence-transformers and FAISS are memory-intensive)
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60       # wait 1 min before scaling up
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60               # add at most 2 pods per minute
    scaleDown:
      stabilizationWindowSeconds: 300      # wait 5 min before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120              # remove at most 1 pod per 2 min
