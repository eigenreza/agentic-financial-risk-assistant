apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: financial-risk-assistant
  namespace: default
  labels:
    app: financial-risk-assistant
  annotations:
    # nginx ingress controller
    kubernetes.io/ingress.class: "nginx"
    # Force HTTPS redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # WebSocket support, required for Streamlit's live updates
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    # TLS certificate via cert-manager (Let's Encrypt)
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  # Uncomment and update for TLS:
  # tls:
  #   - hosts:
  #       - risk-assistant.yourdomain.com
  #     secretName: risk-assistant-tls
  rules:
    - host: risk-assistant.yourdomain.com   # replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: financial-risk-assistant
                port:
                  number: 80
